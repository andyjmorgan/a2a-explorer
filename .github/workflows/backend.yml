name: Backend CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore local tools
        working-directory: backend
        run: dotnet tool restore

      - name: Restore
        working-directory: backend
        run: dotnet restore A2AExplorer.slnx

      - name: Format check (fails on style drift)
        working-directory: backend
        run: dotnet format A2AExplorer.slnx --verify-no-changes

      - name: Build (StyleCop + warnings-as-errors enforced via Directory.Build.props)
        working-directory: backend
        run: dotnet build A2AExplorer.slnx -c Release --no-restore

      - name: Test (non-integration — integration tests need Docker locally)
        working-directory: backend
        run: >
          dotnet test A2AExplorer.slnx
          -c Release --no-build
          --filter "FullyQualifiedName!~Integration.Tests"
          --collect:"XPlat Code Coverage"

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/**/TestResults/**/coverage.cobertura.xml
          if-no-files-found: warn
