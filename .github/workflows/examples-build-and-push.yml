name: Examples Build and Push

on:
  push:
    branches: [main]
    paths:
      - "examples/**"
      - ".github/workflows/examples-build-and-push.yml"
  pull_request:
    branches: [main]
    paths:
      - "examples/**"
      - ".github/workflows/examples-build-and-push.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  AGENTLINGS_REF: main
  DECLINER_IMAGE: ${{ github.repository_owner }}/decliner-agentling
  POLYGLOT_IMAGE: ${{ github.repository_owner }}/polyglot-translator-agentling

jobs:
  build-decliner:
    name: Build Decliner Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.DECLINER_IMAGE }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=,format=short
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - uses: docker/build-push-action@v6
        with:
          context: ./examples/decliner
          file: ./examples/decliner/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha,scope=decliner
          cache-to: type=gha,mode=max,scope=decliner
          build-args: |
            AGENTLINGS_REF=${{ env.AGENTLINGS_REF }}

  build-polyglot:
    name: Build Polyglot Translator Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.POLYGLOT_IMAGE }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=,format=short
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - uses: docker/build-push-action@v6
        with:
          context: ./examples/polyglot-translator
          file: ./examples/polyglot-translator/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha,scope=polyglot
          cache-to: type=gha,mode=max,scope=polyglot
          build-args: |
            AGENTLINGS_REF=${{ env.AGENTLINGS_REF }}
