services:
  postgres:
    image: postgres:17-alpine
    container_name: a2a-explorer-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: a2a_explorer
      POSTGRES_PASSWORD: a2a_explorer_dev
      POSTGRES_DB: a2a_explorer
    ports:
      - "5433:5432"
    volumes:
      - a2a_explorer_pgdata:/var/lib/postgresql/data
      - ./backend/docker/postgres/init.sql:/docker-entrypoint-initdb.d/01-pgcrypto.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U a2a_explorer -d a2a_explorer"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  a2a_explorer_pgdata:
