services:
  postgres:
    image: postgres:17-alpine
    container_name: a2a-explorer-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: a2a_explorer
      POSTGRES_PASSWORD: a2a_explorer_dev
      POSTGRES_DB: a2a_explorer
    ports:
      - "5433:5432"
    volumes:
      - a2a_explorer_pgdata:/var/lib/postgresql/data
      - ./backend/docker/postgres/init.sql:/docker-entrypoint-initdb.d/01-pgcrypto.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U a2a_explorer -d a2a_explorer"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: .
    image: a2a-explorer:local
    container_name: a2a-explorer-api
    restart: unless-stopped
    # Maps host :5180 → container :8080 — that host port is registered as an
    # allowed redirect URI + web origin on the Keycloak a2a-explorer client.
    ports:
      - "5180:8080"
    environment:
      ASPNETCORE_URLS: http://+:8080
      Persistence__ConnectionString: "Host=postgres;Port=5432;Database=a2a_explorer;Username=a2a_explorer;Password=a2a_explorer_dev"
      Keycloak__Authority: "https://auth.donkeywork.dev/realms/Agents"
      Keycloak__Audience: "a2a-explorer"
      Keycloak__ClientId: "a2a-explorer"
      Keycloak__ClientSecret: ${KEYCLOAK_CLIENT_SECRET:?set KEYCLOAK_CLIENT_SECRET in .env}
      Keycloak__FrontendUrl: "http://localhost:5180"
      Keycloak__RequireHttpsMetadata: "true"
      Security__CredentialEncryptionKey: ${SECURITY_ENCRYPTION_KEY:?set SECURITY_ENCRYPTION_KEY in .env}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  a2a_explorer_pgdata:
